name: Update Commodities Data

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-commodities-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install yfinance
        run: pip install yfinance
      - name: Fetch commodities data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python collect_data.py
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commodities_data.js preipo_data.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TS=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
          git commit -m "chore: update commodities data (${TS})"
          git push
